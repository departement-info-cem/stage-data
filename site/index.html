<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondage annuel des stagiaires en technique informatique</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>
    <header class="site-header">
        <div class="site-header__inner">
            <div class="site-header__top">
                <img class="site-header__logo" src="static/img/logo_cegep.svg" alt="Cégep Édouard-Montpetit">
                <div class="site-header__divider" aria-hidden="true"></div>
                <div class="site-header__title-block">
                    <h1>Sondage annuel des stagiaires en technique informatique</h1>
                    <p class="site-header__subtitle">Au fil des années</p>
                </div>
            </div>
            <div class="site-header__filters">
                <nav class="year-selector filter-group filter-years" aria-label="Sélection de l'année ou de la vue comparative"></nav>
                <nav class="program-selector filter-group filter-programs" aria-label="Filtrer par programme" hidden></nav>
            </div>
            <div id="general-info" aria-live="polite">
                Chargement des données générales…
            </div>
        </div>
    </header>

    <main class="site-main">
        <div class="charts-container" id="chartsContainer">
            <!-- Les graphiques seront générés dynamiquement ici -->
        </div>
    </main>

    <footer class="site-footer">
        <div class="site-footer__inner">
