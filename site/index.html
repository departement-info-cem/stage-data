<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sondage annuel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Sondage annuel des stagiaires en technique informatique du CÉGEP Édouard-Montpetit au fil
                des années</h1>
            <nav class="year-selector" aria-label="Sélection de l'année ou de la vue comparative"></nav>
            <nav class="program-selector" aria-label="Filtrer par programme" hidden></nav>
            <div id="general-info" aria-live="polite">
                Chargement des données générales…
            </div>
        </header>
        
        <main>
            <div class="charts-container" id="chartsContainer">
                <!-- Les graphiques seront générés dynamiquement ici -->
            </div>
        </main>

        <footer class="site-footer">
            <a class="footer-link" href="https://github.com/departement-info-cem/stage-data" target="_blank" rel="noopener noreferrer" aria-label="Code source sur GitHub">
                <i data-lucide="github" aria-hidden="true"></i>
                <span>Code source</span>
            </a>
            <span class="footer-credit">&copy; <span id="footer-year"></span> Pierre-Olivier Brillant — Tous droits réservés</span>
        </footer>
    </div>
    <script type="module" src="app.js"></script>
</body>

</html>
